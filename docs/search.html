<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拿幸教节目搜索引擎 🪐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
            color: #00ff88;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 赛博朋克背景效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 0, 255, 0.03) 0px,
                rgba(255, 0, 255, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1;
        }

        .back-button-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-start;
        }

        .back-button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff00ff, #00ccff);
            border: 2px solid #ff00ff;
            border-radius: 4px;
            color: #0a0e27;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .back-button:hover {
            background: linear-gradient(135deg, #ffff00, #ff00ff);
            border-color: #ffff00;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            border: 2px solid #00ff88;
            border-radius: 8px;
            background: rgba(0, 255, 136, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2), inset 0 0 10px rgba(0, 255, 136, 0.1);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #ff00ff;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #ffff00;
            margin-bottom: 5px;
            text-shadow: 0 0 5px #ffff00;
        }

        .tagline {
            font-size: 0.9em;
            color: #00ccff;
            margin-top: 10px;
        }

        .search-container {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            max-width: 500px;
            padding: 12px 15px;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 4px;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .search-box:focus {
            border-color: #ffff00;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.5), inset 0 0 10px rgba(255, 255, 0, 0.1);
            color: #ffff00;
        }

        .search-box::placeholder {
            color: rgba(0, 255, 136, 0.5);
        }

        .btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: 2px solid #00ff88;
            border-radius: 4px;
            color: #0a0e27;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .btn:hover {
            background: linear-gradient(135deg, #ffff00, #ff00ff);
            border-color: #ffff00;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
            transform: translateY(-2px);
        }

        .stats {
            text-align: center;
            margin-bottom: 20px;
            color: #00ccff;
            font-size: 0.95em;
        }

        .results-container {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff00ff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2), inset 0 0 10px rgba(255, 0, 255, 0.1);
        }

        .result-item {
            background: rgba(0, 255, 136, 0.05);
            border-left: 4px solid #00ff88;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .result-item:hover {
            background: rgba(0, 255, 136, 0.15);
            border-left-color: #ffff00;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            transform: translateX(5px);
        }

        .result-number {
            display: inline-block;
            background: #ff00ff;
            color: #0a0e27;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
            margin-right: 10px;
            font-size: 0.9em;
        }

        .result-title {
            color: #ffff00;
            font-size: 1.1em;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .result-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.9em;
            color: #00ccff;
        }

        .result-link {
            color: #00ff88;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .result-link:hover {
            color: #ffff00;
            text-decoration: underline;
            text-shadow: 0 0 10px #ffff00;
        }

        .result-time {
            color: #ff00ff;
        }

        .result-views {
            color: #00ccff;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #ff00ff;
            font-size: 1.2em;
        }

        .no-results-emoji {
            font-size: 3em;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #00ccff;
            border-top: 2px solid #00ff88;
            font-size: 0.9em;
        }

        .highlight {
            background: rgba(255, 255, 0, 0.3);
            color: #ffff00;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .search-container {
                flex-direction: column;
            }

            .search-box {
                max-width: 100%;
            }

            .result-meta {
                flex-direction: column;
                gap: 5px;
            }
        }

        /* 闪烁效果 */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 10px #00ff88, 0 0 20px #ff00ff;
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }

        .flicker {
            animation: flicker 3s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-button-container">
            <a href="https://github.com/davidwuw0811-boop/NaXingJiao-AI" class="back-button" target="_blank">← 返回仓库首页</a>
        </div>
        <header>
            <h1 class="flicker">🐊 拿幸教节目搜索引擎（真实直播回放）</h1>
            <div class="subtitle">Everything both nothing！</div>
            <div class="tagline">快速查找老王的节目，一切都是拿幸</div>
        </header>

        <div class="search-container">
            <input 
                type="text" 
                id="searchInput" 
                class="search-box" 
                placeholder="搜索关键词... 比如：玄学、伊朗、移民、鬼故事、投资"
                autocomplete="off"
            >
            <button class="btn" onclick="search()">🔍 搜索</button>
            <button class="btn" onclick="clearSearch()" style="background: linear-gradient(135deg, #ff00ff, #ff6600); border-color: #ff00ff;">🔄 清空</button>
        </div>

        <div class="stats">
            <span id="resultCount">共 20 期节目</span>
        </div>

        <div class="results-container">
            <div id="results"></div>
        </div>

        <footer>
            <p>拿幸教AI分舵 | 老王来了 @dlw2023 | 教主 @dlw20202020</p>
            <p style="margin-top: 10px; color: #ff00ff;">玩得开心最重要👍 | Everything both nothing！</p>
        </footer>
    </div>

    <script>
        // 节目数据
        const episodes = [
            { id: 1, title: "周末玄学故事会：自尽者的轮回实录｜法国猫灵者｜秘鲁死藤水之旅｜鬼推车害人的诡事", link: "https://www.youtube.com/watch?v=ybHsI7fc9kA", time: "1天前", views: "6.9万" },
            { id: 2, title: "VIP直播：解放军台海军情报告｜1，为什么一线兵力配置发生了质变？", link: "https://www.youtube.com/watch?v=b6piWWnsHkA", time: "3天前", views: "会员专享" },
            { id: 3, title: "长夜漫漫无心睡眠，聊聊散天：答网友问我闺女被穷小子拐跑了怎么办？", link: "https://www.youtube.com/@dlw2023/videos", time: "4天前", views: "7.8万" },
            { id: 4, title: "美伊谈崩，利好中国，台湾大…", link: "https://www.youtube.com/@dlw2023/videos", time: "最近", views: "-" },
            { id: 5, title: "郑丽文饮鸩止渴，习近平身高成谜｜周末玄学故事会", link: "https://www.youtube.com/watch?v=HwXu1vHaICk", time: "5天前", views: "18万" },
            { id: 6, title: "VIP直播：台湾行考察结束了说点秘密，习总此生打台湾这回没戏了", link: "https://www.youtube.com/watch?v=7TqKyRwunLI", time: "2周前", views: "15万" },
            { id: 7, title: "VIP直播：揭秘共产党跨境控制王志安们的高招｜揭秘反共大V为什么突然亲共？", link: "https://www.youtube.com/watch?v=hJPNSC_4qvE", time: "3周前", views: "13万" },
            { id: 8, title: "VIP直播：女企业家的最高境界之大耍陈丽华", link: "https://www.youtube.com/watch?v=QcwmxFnUTvY", time: "1个月前", views: "会员专享" },
            { id: 9, title: "老王来了：鬼推车害人事件｜通灵师真实经历｜诡事三则", link: "https://www.youtube.com/watch?v=ybHsI7fc9kA", time: "最近", views: "6.9万" },
            { id: 10, title: "老王来了：秘鲁喝死藤水真实感受｜萨满禁忌秘药｜千万别轻易尝试", link: "https://www.youtube.com/watch?v=mngeUyDRh5Y", time: "1天前", views: "-" },
            { id: 11, title: "老王来了：陆尉闯中领馆切腹未遂｜小粉红炸美军基地被重判｜世界越来越极端？", link: "https://www.youtube.com/watch?v=K-Jylb7p4I4", time: "3天前", views: "-" },
            { id: 12, title: "老王来了：移民最大的难题，父母养老的残酷现实！", link: "https://www.youtube.com/watch?v=v8SrHQKuh58", time: "5天前", views: "-" },
            { id: 13, title: "老王来了：2028年全球失业潮爆发？｜你必须做好最坏准备｜AI", link: "https://www.youtube.com/watch?v=Rw3FPxwTcDY", time: "1个月前", views: "10万+" },
            { id: 14, title: "老王来了：哈梅内伊确认身亡｜美国出手仅用一天｜伊朗政权雪崩", link: "https://www.youtube.com/watch?v=Jo0IQO6CwjQ", time: "最近", views: "-" },
            { id: 15, title: "老王来了：台湾阶级固化严重｜台湾年轻人如何破局改命？", link: "https://www.youtube.com/watch?v=YGfKuwiYR8o", time: "1个月前", views: "-" },
            { id: 16, title: "大陆会彻底封禁VPN？｜翻墙到底安不安全｜教友来信求助", link: "https://www.youtube.com/watch?v=cPS9qQBvI4U", time: "7天前", views: "-" },
            { id: 17, title: "老王来了：黄仁勋突然破防！富二代争夺家产欲背刺亲爹", link: "https://www.youtube.com/watch?v=qmuyZGEYepc", time: "1天前", views: "-" },
            { id: 18, title: "老王来了：\"抓线头\" 但抓不住机会 \"欲望\"击穿原则 \"浮躁\"是创业失败的主因", link: "https://www.youtube.com/watch?v=-G5k8ektjtE", time: "最近", views: "-" },
            { id: 19, title: "老王来了：93阅兵三大杀器曝光｜中国军工突然崛起？赶超美国", link: "https://www.youtube.com/watch?v=Y5lv9uqoZJ8", time: "7个月前", views: "-" },
            { id: 20, title: "信号测试", link: "https://www.youtube.com/watch?v=_3bDdTDidto", time: "4个月前", views: "8.4万" },

        ];

        function search() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) {
                displayAllResults();
                return;
            }

            const filtered = episodes.filter(ep => 
                ep.title.toLowerCase().includes(keyword)
            );

            if (filtered.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-emoji">🪐</div>
                        <p>没有找到相关节目...</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">试试其他关键词？一切都是拿幸！</p>
                    </div>
                `;
                document.getElementById('resultCount').textContent = `搜索结果：0 期`;
            } else {
                displayResults(filtered);
                document.getElementById('resultCount').textContent = `搜索结果：${filtered.length} 期`;
            }
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = results.map(ep => `
                <div class="result-item" onclick="openLink('${ep.link}')">
                    <div>
                        <span class="result-number">#${ep.id}</span>
                        <span class="result-title">${highlightKeyword(ep.title)}</span>
                    </div>
                    <div class="result-meta">
                        <a href="${ep.link}" class="result-link" target="_blank" onclick="event.stopPropagation()">🔗 观看视频</a>
                        <span class="result-time">⏰ ${ep.time}</span>
                        <span class="result-views">👁️ ${ep.views}</span>
                    </div>
                </div>
            `).join('');
        }

        function displayAllResults() {
            displayResults(episodes);
            document.getElementById('resultCount').textContent = `共 ${episodes.length} 期节目`;
        }

        function highlightKeyword(title) {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!keyword) return title;
            
            const regex = new RegExp(`(${keyword})`, 'gi');
            return title.replace(regex, '<span class="highlight">$1</span>');
        }

        function openLink(url) {
            window.open(url, '_blank');
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            displayAllResults();
        }

        // 回车键搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        // 页面加载时显示所有结果
        window.addEventListener('load', function() {
            displayAllResults();
        });

        // 实时搜索（可选）
        document.getElementById('searchInput').addEventListener('input', function() {
            if (this.value.length > 0) {
                search();
            } else {
                displayAllResults();
            }
        });
    </script>
</body>
</html>
