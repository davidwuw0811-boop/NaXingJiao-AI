        function search() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) {
                displayAllResults();
                return;
            }

            const filtered = episodes.filter(ep => 
                ep.title.toLowerCase().includes(keyword)
            );

            if (filtered.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-emoji">🪐</div>
                        <p>没有找到相关节目...</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">试试其他关键词？一切都是拿幸！</p>
                    </div>
                `;
                document.getElementById('resultCount').textContent = `搜索结果：0 期`;
            } else {
                displayResults(filtered);
                document.getElementById('resultCount').textContent = `搜索结果：${filtered.length} 期`;
            }
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = results.map(ep => `
                <div class="result-item" onclick="openLink('${ep.link}')">
                    <div>
                        <span class="result-number">#${ep.id}</span>
                        <span class="result-title">${highlightKeyword(ep.title)}</span>
                    </div>
                    <div class="result-meta">
                        <a href="${ep.link}" class="result-link" target="_blank" onclick="event.stopPropagation()">🔗 观看视频</a>
                        <span class="result-time">⏰ ${ep.time}</span>
                        <span class="result-views">👁️ ${ep.views}</span>
                    </div>
                </div>
            `).join('');
        }

        function displayAllResults() {
            displayResults(episodes);
            document.getElementById('resultCount').textContent = `共 ${episodes.length} 期节目`;
        }

        function highlightKeyword(title) {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!keyword) return title;
            
            const regex = new RegExp(`(${keyword})`, 'gi');
            return title.replace(regex, '<span class="highlight">$1</span>');
        }

        function openLink(url) {
            window.open(url, '_blank');
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            displayAllResults();
        }

        // 回车键搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        // 页面加载时显示所有结果
        window.addEventListener('load', function() {
            displayAllResults();
        });

        // 实时搜索（可选）
        document.getElementById('searchInput').addEventListener('input', function() {
            if (this.value.length > 0) {
                search();
            } else {
                displayAllResults();
            }
        });
    </script>
